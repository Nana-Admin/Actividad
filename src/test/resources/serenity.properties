webdriver.driver=chrome
webdriver.chrome.driver=src/test/resources/chromedriver.exe
webdriver.chrome.logfile=target/chromedriver.log
serenity.project.name=OrangeHRM Test Automation
serenity.take.screenshots=AFTER_EACH_STEP
serenity.verbose.steps=FALSE
serenity.report.encoding=UTF-8
serenity.timeout=15000
webdriver.wait.for.timeout=15000
chrome.switches=--disable-gpu --no-sandbox --disable-dev-shm-usage --remote-allow-origins=*
headless.mode=false
